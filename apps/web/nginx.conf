server {
    listen 80;
    server_name _;  # Accept requests for any hostname

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    # Compresses text responses before sending to the browser.
    # Angular's JS bundles can be 200–500KB uncompressed; gzip brings this
    # down to 60–150KB — a significant improvement on slower connections.
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;  # Don't compress tiny files (compression overhead not worth it)
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Angular client-side routing ──────────────────────────────────────────
    # This is the most important block for Angular apps.
    #
    # The problem: Angular is a Single Page Application (SPA). All routing
    # happens in the browser via JavaScript — there are no physical files at
    # paths like /notes/123 or /dashboard. When a user bookmarks a URL or
    # refreshes the page, Nginx looks for a file at that path, finds nothing,
    # and returns 404.
    #
    # The fix: try_files tells Nginx to:
    #   1. Try to serve the exact file ($uri)
    #   2. Try to serve it as a directory ($uri/)
    #   3. Fall back to /index.html — which loads Angular, which handles the route
    #
    # Without this, the Angular app works when you navigate from the home page
    # but breaks on any direct URL or browser refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Aggressive caching for hashed assets ─────────────────────────────────
    # Angular's production build adds a content hash to every filename:
    #   main.a3f8b9c1.js, styles.2d891a4e.css, etc.
    #
    # Since the filename changes whenever the content changes, it's safe to
    # tell browsers to cache these files forever. Old files will never be
    # accidentally served — a new deploy produces entirely new filenames.
    #
    # "immutable" tells browsers not to revalidate even when Cache-Control
    # max-age expires — an additional optimization for modern browsers.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;  # Don't log requests for static assets (reduces log noise)
    }

    # ── index.html: no cache ──────────────────────────────────────────────────
    # index.html is the only file without a hash in its name.
    # It must never be cached — browsers must always fetch the latest version
    # so they load the new hashed JS/CSS filenames after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
